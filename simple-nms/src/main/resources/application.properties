# H2 DB
spring.datasource.url=jdbc:h2:file:./data/nms-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
``

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# IMPORTANT (fix for 404 in newer Spring Boot)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Alert thresholds
alert.temperature.threshold=80
alert.packet.threshold=4000

# JWT Config
jwt.secret=mysupersecretkeymysupersecretkey
jwt.expiration=3600000